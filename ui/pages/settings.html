<div class="p-8">
  <h2 class="text-3xl font-black tracking-tight text-slate-900">Settings</h2>
  <p class="text-slate-500 mt-1">Configure MTK Studio</p>
  <div class="mt-6 max-w-lg">
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
      <h3 class="font-bold uppercase text-xs tracking-widest text-slate-700 mb-4">Developer Options</h3>
      <div class="flex items-center justify-between">
        <div>
          <div class="text-sm font-semibold text-slate-900">Mock Mode</div>
          <div class="text-xs text-slate-500 mt-0.5">Simulate device operations without real hardware</div>
        </div>
        <button id="mock-toggle" onclick="toggleMockMode()" class="relative inline-flex h-6 w-11 items-center rounded-full bg-slate-200 transition-colors" role="switch" aria-checked="false">
          <span id="mock-toggle-thumb" class="inline-block h-4 w-4 transform rounded-full bg-white shadow translate-x-1 transition-transform"></span>
        </button>
      </div>
    </div>
  </div>
</div>
<script>
async function toggleMockMode() {
  var btn = document.getElementById('mock-toggle');
  var thumb = document.getElementById('mock-toggle-thumb');
  var current = btn.getAttribute('aria-checked') === 'true';
  var next = !current;
  btn.setAttribute('aria-checked', String(next));
  btn.classList.toggle('bg-blue-600', next);
  btn.classList.toggle('bg-slate-200', !next);
  thumb.classList.toggle('translate-x-6', next);
  thumb.classList.toggle('translate-x-1', !next);
  if (window.Bridge) await Bridge.setMockMode(next);
  if (window.showToast) window.showToast('success', next ? 'Mock mode enabled' : 'Mock mode disabled');
}

function setToggleState(enabled) {
  var btn = document.getElementById('mock-toggle');
  var thumb = document.getElementById('mock-toggle-thumb');
  if (!btn || !thumb) return;
  btn.setAttribute('aria-checked', String(!!enabled));
  btn.classList.toggle('bg-blue-600', !!enabled);
  btn.classList.toggle('bg-slate-200', !enabled);
  thumb.classList.toggle('translate-x-6', !!enabled);
  thumb.classList.toggle('translate-x-1', !enabled);
}

// Init immediately (DOMContentLoaded already fired in SPA context)
(async function() {
  if (window.Bridge) {
    var result = await Bridge.getMockMode();
    // Handle both bare boolean and {mock_mode: bool} object
    var enabled = (result && typeof result === 'object') ? !!result.mock_mode : !!result;
    setToggleState(enabled);
  }
})();
</script>
